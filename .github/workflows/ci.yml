name: CI - Auth-Service
on: [push]
jobs:
  docker_build:
    runs-on: self-hosted
    steps:
       - uses: actions/checkout@v6
       - name: Build image
         run: make docker-build image_tag=${GITHUB_SHA}

  eks-deploy:
    needs: docker_build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: sh-devops-itrn-2/wmp-helm-v1
          path: helm
      - name: Helm Deploy
        run: make eks-deploy image_tag=${GITHUB_SHA}

      
      
